name: PS4 GoldHEN Monitor

on:
  schedule:
    - cron: '0 * * * *' # الكود هيشتغل رأس كل ساعة
  workflow_dispatch: # الزرار ده بيسمحلك تشغله يدوي عشان تجربه

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py
